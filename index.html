<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Memory Match <span style="font-size: 1.5rem; color: var(--accent-color);">(Level <span id="current-level">1</span>)</span></h1>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">Moves</span>
                    <span class="value" id="moves">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">Time</span>
                    <span class="value" id="time">0:00</span>
                </div>
            </div>
            <button id="restart-btn" class="btn">Restart Game</button>
        </header>

        <main class="grid-container" id="grid">
            <!-- Cards will be generated by JS -->
        </main>
    </div>
    
    <div class="modal-overlay" id="win-modal">
        <div class="modal-content">
            <h2>Level Cleared! 🎉</h2>
            <p>You completed the level in <strong id="final-moves">0</strong> moves and <strong id="final-time">0:00</strong>.</p>
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                <button id="play-again-btn" class="btn">Restart Level</button>
                <button id="next-level-btn" class="btn primary-btn">Next Level</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
