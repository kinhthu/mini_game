<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lobby-wrapper">
        <!-- Navigation Tabs -->
        <nav class="game-tabs">
            <button class="tab-btn active" data-tab="memory">
                <span class="tab-icon">🧠</span> Memory Match
            </button>
            <button class="tab-btn" data-tab="caro">
                <span class="tab-icon">❌</span> Cờ Ca Rô
            </button>
        </nav>

        <!-- Game Sections -->
        <!-- Memory Match Section -->
        <section id="memory-game-section" class="game-section active">
            <div class="game-container">
                <header>
                    <h1>Memory Match <span style="font-size: 1.5rem; color: var(--accent-color);">(Level <span id="current-level">1</span>)</span></h1>
                    <div class="stats">
                        <div class="stat-box">
                            <span class="label">Moves</span>
                            <span class="value" id="moves">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="label">Time</span>
                            <span class="value" id="time">0:00</span>
                        </div>
                    </div>
                    <button id="restart-btn" class="btn">Restart Game</button>
                </header>

                <main class="grid-container" id="grid">
                    <!-- Cards will be generated by JS -->
                </main>
            </div>
            
            <div class="modal-overlay" id="win-modal">
                <div class="modal-content">
                    <h2>Level Cleared! 🎉</h2>
                    <p>You completed the level in <strong id="final-moves">0</strong> moves and <strong id="final-time">0:00</strong>.</p>
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                        <button id="play-again-btn" class="btn">Restart Level</button>
                        <button id="next-level-btn" class="btn primary-btn">Next Level</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Caro Section -->
        <section id="caro-game-section" class="game-section" style="display: none;">
            <div class="game-container">
                <header>
                    <h1>Cờ Ca Rô <span style="font-size: 1.5rem; color: #06b6d4;">(Gomoku)</span></h1>
                    
                    <!-- Mode Toggle -->
                    <div class="mode-toggle">
                        <button id="caro-mode-pve" class="btn-toggle active" data-mode="bot">🤖 vs Bot</button>
                        <button id="caro-mode-pvp" class="btn-toggle" data-mode="pvp">👥 PvP</button>
                    </div>

                    <!-- Scoreboard -->
                    <div class="stats">
                        <div class="stat-box">
                            <span class="label" style="color: #fb7185; font-weight: bold;">X Wins</span>
                            <span class="value" id="caro-score-x">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="label">Draws</span>
                            <span class="value" id="caro-score-draws">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="label" style="color: #06b6d4; font-weight: bold;">O Wins</span>
                            <span class="value" id="caro-score-o">0</span>
                        </div>
                    </div>

                    <!-- Timer & Current Turn -->
                    <div class="stats">
                        <div class="stat-box">
                            <span class="label">Time</span>
                            <span class="value" id="caro-time">0:00</span>
                        </div>
                        <div class="stat-box">
                            <span class="label">Turn</span>
                            <span class="value" id="caro-turn"><span class="turn-indicator turn-x">X</span></span>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div style="display: flex; gap: 1rem;">
                        <button id="caro-undo-btn" class="btn">Undo</button>
                        <button id="caro-restart-btn" class="btn primary-btn">Restart Game</button>
                    </div>
                </header>

                <!-- Board Wrapper for responsive scrolling if board exceeds screen width -->
                <div class="caro-board-wrapper">
                    <div class="caro-board" id="caro-board"></div>
                </div>
            </div>

            <!-- Caro Victory Modal -->
            <div class="modal-overlay" id="caro-win-modal">
                <div class="modal-content">
                    <h2 id="caro-win-title">Victory! 🎉</h2>
                    <p id="caro-win-text">Player X has won the match!</p>
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                        <button id="caro-play-again-btn" class="btn primary-btn">Play Again</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
    
    <script src="js/memory.js"></script>
    <script src="js/caro.js"></script>
    <script src="main.js"></script>
</body>
</html>
